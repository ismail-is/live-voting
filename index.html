  <!-- Google Font: Cairo (Arabic) -->

<body class="min-h-screen text-white relative overflow-x-hidden">

  <div class="stars-bg"></div>

  <!-- ============ HEADER ============ -->
  <header class="relative z-10 border-b border-[rgba(212,175,55,0.25)] bg-black/40 backdrop-blur-md">
    <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col md:flex-row items-center justify-between gap-4">

      <div class="flex items-center gap-3">
        <div class="w-12 h-12 rounded-full flex items-center justify-center text-2xl rank-gold rank-badge">🗳️</div>
        <div>
          <h1 class="text-xl md:text-2xl font-black gold-text">برنامج حوارة الموسم ( الموسم الثاني )</h1>
          <p class="text-xs text-gray-400 flex items-center gap-1">
            <span class="pulse-dot"></span> Live Results
          </p>
        </div>
      </div>

      <!-- Counters -->
      <div class="flex flex-col md:flex-row items-center gap-4">
        <!-- Leader counter -->
        <div id="topCandidateBox" class="counter-box rounded-2xl px-6 py-3 flex items-center gap-3 hidden">
          <span class="text-2xl">🏆</span>
          <span id="leaderLabel" class="text-sm text-gray-300">Leading:</span>
          <span id="topCandidateName" class="font-bold">---</span>
          <span class="w-px h-6 bg-[rgba(212,175,55,0.4)]"></span>
          <span id="topCandidateVotes" class="text-2xl font-black gold-text">0</span>
        </div>

        <!-- Total votes counter -->
        <div class="counter-box rounded-2xl px-6 py-3 flex items-center gap-3">
          <span class="text-2xl">🗳️</span>
          <span class="text-sm text-gray-300">Total Votes</span>
          <span class="w-px h-6 bg-[rgba(212,175,55,0.4)]"></span>
          <span id="totalVotes" class="text-2xl font-black gold-text">0</span>
        </div>
      </div>

      <!-- Auth area -->
      <div id="authArea" class="flex items-center gap-3">
        <button id="googleSignInBtn" class="flex items-center gap-2 bg-white text-black px-4 py-2 rounded-full font-bold hover:scale-105 transition-transform shadow-lg cursor-pointer">
          <svg class="w-5 h-5" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            <path fill="none" d="M0 0h48v48H0z"/>
          </svg>
          <span>Sign in with Google</span>
        </button>
        <div id="userChip" class="hidden items-center gap-2 glass-card rounded-full px-3 py-1.5">
          <img id="userAvatar" class="w-7 h-7 rounded-full" src="" alt="">
          <span id="userName" class="text-sm"></span>
        </div>
      </div>
    </div>
  </header>

  <!-- ============ MAIN ============ -->
  <main class="relative z-10 max-w-6xl mx-auto px-4 py-10">

    <p id="statusBanner" class="hidden text-center mb-8 py-3 px-4 rounded-xl border text-sm font-semibold"></p>

    <div id="candidatesGrid" class="grid grid-cols-1 md:grid-cols-3 gap-8">
      <!-- Candidate cards injected by script.js -->
    </div>

    <p class="text-center text-xs text-gray-500 mt-12">
      Each Gmail account can vote only once. Duplicates are checked on the server to ensure voting integrity.
    </p>
    <p class="text-center text-xs text-gray-600 mt-2">
      <a href="admin.html" class="underline hover:text-[var(--gold-2)]">Admin Dashboard</a>
    </p>
  </main>

  <script src="config.js?v=3"></script>
  <script src="script.js?v=3"></script>

  <script>

  </script>
